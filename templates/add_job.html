<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Add Job Role - Snappy</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
        <style>
            .snappy-green {
                background-color: #28a745 !important;
            }
        </style>
    </head>
    <body class="bg-light">
        {% set active_page = 'add_job' %}
        {% include 'admin_navbar.html' %}

        <div class="container mt-5" style="max-width: 800px">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="card-title text-center mb-4">Add New Job Role</h3>
                    
                    <form action="/add-job" method="post">
                        <div class="mb-3">
                            <label for="title_offer" class="form-label fw-bold">Job Role Title</label>
                            <input type="text" class="form-control" id="title_offer" name="title_offer" required placeholder="e.g. Data Scientist" />
                        </div>
                        <div class="mb-4">
                            <label for="job_description" class="form-label fw-bold">Job Description & Requirements</label>
                            <textarea class="form-control" id="job_description" name="job_description" rows="6" required placeholder="Enter the full job description here..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-success snappy-green border-0 w-100 fw-bold py-2">Add Job Role</button>
                    </form>

                    {% if success_message %}
                    <div class="alert alert-success mt-4 mb-0 text-center fw-bold" role="alert">
                        {{ success_message }}
                    </div>
                    {% endif %}
                    
                    {% if error %}
                    <div class="alert alert-danger mt-4 mb-0 text-center fw-bold" role="alert">
                        {{ error }}
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
