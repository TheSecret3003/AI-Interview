<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login - Snappy Interview AI</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
        <style>
            body {
                background-color: #f8f9fa;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .snappy-green {
                background-color: #28a745 !important;
            }
            .snappy-text {
                color: #28a745 !important;
            }
            .card {
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
                border: none;
                width: 100%;
                max-width: 400px;
            }
        </style>
    </head>
    <body>
        <div class="card p-4">
            <div class="text-center mb-4">
                <h2 class="snappy-text fw-bold">Snappy HR</h2>
                <p class="text-muted">Sign in to your account</p>
            </div>

            <form action="/login" method="post">
                <div class="mb-3">
                    <label for="email" class="form-label fw-bold">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" required placeholder="name@example.com" />
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-bold">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="••••••••" />
                </div>
                <button type="submit" class="btn btn-success snappy-green w-100 mb-3 border-0 py-2 fw-bold">Sign In</button>
            </form>

            {% if error %}
            <div class="alert alert-danger text-center" role="alert">
                {{ error }}
            </div>
            {% endif %}

            <div class="text-center mt-2">
                <p class="text-muted mb-0">Applying for a job?</p>
                <a href="/cv-submission" class="text-decoration-none snappy-text fw-bold">Submit your CV here</a>
            </div>
        </div>
    </body>
</html>
