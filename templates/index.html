<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AI Interview - CV Submission</title>
        <!-- Bootstrap CSS for styling -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <style>
            body {
                background-color: #f8f9fa;
            }
            .container {
                max-width: 800px;
                margin-top: 50px;
            }
            .card {
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            }
            .snappy-green {
                background-color: #28a745 !important;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="text-center mb-4">
                <h2>CV Submission</h2>
                <p class="text-muted">Submit your details and CV</p>
            </div>

            <div class="card p-4 mb-4 border-0">
                <form
                    action="/analyze"
                    method="post"
                    enctype="multipart/form-data"
                >
                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name</label>
                        <input
                            type="text"
                            class="form-control"
                            id="name"
                            name="name"
                            required
                            placeholder="John Doe"
                        />
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label"
                            >Email Address</label
                        >
                        <input
                            type="email"
                            class="form-control"
                            id="email"
                            name="email"
                            required
                            placeholder="john@example.com"
                        />
                    </div>

                    <div class="mb-3">
                        <label for="wa_number" class="form-label"
                            >WhatsApp Number</label
                        >
                        <input
                            type="tel"
                            class="form-control"
                            id="wa_number"
                            name="wa_number"
                            required
                            placeholder="081xxxxxxx"
                        />
                    </div>

                    <div class="mb-3">
                        <label for="education" class="form-label"
                            >Highest Education</label
                        >
                        <input
                            type="text"
                            class="form-control"
                            id="education"
                            name="education"
                            required
                            placeholder=""
                        />
                    </div>

                    <div class="mb-3">
                        <label for="job_role" class="form-label"
                            >Job Role</label
                        >
                        <select
                            class="form-select"
                            id="job_role"
                            name="job_role"
                            required
                        >
                            {% for role in roles %}
                            <option value="{{ role }}">{{ role }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="cv_file" class="form-label"
                            >Upload CV (.docx)</label
                        >
                        <input
                            class="form-control"
                            type="file"
                            id="cv_file"
                            name="cv_file"
                            accept=".docx"
                            required
                        />
                    </div>

                    <button
                        type="submit"
                        class="btn btn-success snappy-green border-0 w-100"
                    >
                        Submit
                    </button>
                </form>
            </div>

            {% if error %}
            <div class="alert alert-danger" role="alert">{{ error }}</div>
            {% endif %} {% if success_message %}
            <div class="alert alert-success text-center py-4" role="alert">
                <h4 class="alert-heading">Success!</h4>
                <p class="mb-3">{{ success_message }}</p>

                {% if password_message %}
                <div
                    class="p-3 bg-white border border-success rounded d-inline-block text-start mb-3"
                >
                    <small class="text-muted d-block mb-1"
                        >Your auto-generated password for the Interview:</small
                    >
                    <span class="fs-4 fw-bold snappy-text"
                        >{{ password_message }}</span
                    >
                </div>
                {% endif %}

                <hr />
                <a href="/" class="btn btn-success snappy-green fw-bold"
                    >Login to Start Interview &rarr;</a
                >
            </div>
            {% endif %}
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
